# Redis 配置示例
redis:
  # 单实例配置示例1
  default:
    address: 127.0.0.1:6379
    db: 10
    pass: dev_pwd_123

    minIdle: "4"   # 允许闲置的最小连接数
    maxIdle: "8"  # 允许闲置的最大连接数(0表示不限制)
    maxActive: "16" # 最大连接数量限制(0表示不限制)
    idleTimeout: "30m"  # 连接最大空闲时间，使用时间字符串例如30s/1m/1d

  # 单实例配置示例2
  cache:
    address: 127.0.0.1:6379
    db: 10
    pass: dev_pwd_123

    minIdle: "4"   # 允许闲置的最小连接数
    maxIdle: "8"  # 允许闲置的最大连接数(0表示不限制)
    maxActive: "16" # 最大连接数量限制(0表示不限制)
    idleTimeout: "30m"  # 连接最大空闲时间，使用时间字符串例如30s/1m/1d

logger:
  level: "all"
  stdout: true

jwt:
  # 认证信息Http请求头
  tokenHeader: "Authorization"

  # 认证信息Http请求头
  tokenPrefix: "Bearer "

  # token secret
  tokenSecret: "43286a86708820e38c333cdd4c496351"

  # 过期时间 单位minutes
  tokenTttl: 3600

  # 刷新时间 单位minutes
  tokenRefreshTtl: 20160

