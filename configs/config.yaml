# 系统配置（与 golershop manifest/config 中 shopSuite 段对齐；布尔项使用 YAML bool 以便 config.Load 解析）
shopSuite:
  version: "v1.0.0"
  appDebug: true
  dbDebug: true
  uploadDir: "./resource/public/uploads"
  urlBase: "http://127.0.0.1:8000"
  urlH5: "http://localhost:8080/#"
  urlPc: "https://demo.modulithshop.cn"
  cacheEnable: true
  cacheNamespace: "gs:1001:"
  cacheSeparator: ":"

licence:
  key: "="


# 数据库连接配置
database:
